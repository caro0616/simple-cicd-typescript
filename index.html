<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
</head>
<body>

  <h1>Calculator</h1>

  <input type="number" id="num1" placeholder="First number">

  <select id="operation">
    <option value="sum">+</option>
    <option value="subtract">−</option>
    <option value="multiply">×</option>
    <option value="divide">÷</option>
  </select>

  <input type="number" id="num2" placeholder="Second number">

  <button id="calculate">Calculate</button>

  <p>Result: <strong id="result">—</strong></p>

  <script src="sum.js"></script>

  <script>
    document.getElementById("calculate").addEventListener("click", function () {

      var a = Number(document.getElementById("num1").value) || 0;
      var b = Number(document.getElementById("num2").value) || 0;
      var op = document.getElementById("operation").value;
      var res;

      try {
        if (op === "sum") res = sum(a, b);
        else if (op === "subtract") res = subtract(a, b);
        else if (op === "multiply") res = multiply(a, b);
        else if (op === "divide") res = divide(a, b);

        document.getElementById("result").textContent = res;
      } catch (e) {
        document.getElementById("result").textContent = e.message;
      }

    });
  </script>

</body>
</html>
